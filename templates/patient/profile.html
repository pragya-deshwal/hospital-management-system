{% extends "layout.html" %}
{% block content %}

<h2 class="mb-4 text-center">Your Profile</h2>

<form method="POST" class="mx-auto" style="max-width: 450px;">
    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" required value="{{ patient.name }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Age</label>
        <input type="number" name="age" class="form-control" required value="{{ patient.age }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-control" required>
            <option {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
            <option {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
            <option {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Contact</label>
        <input type="text" name="contact" class="form-control" value="{{ patient.contact }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ patient.email }}">
    </div>
    <button class="btn btn-success w-100 mt-2">Update Profile</button>
</form>

<a href="{{ url_for('patient.dashboard') }}" class="btn btn-secondary mt-3">Back to Dashboard</a>

{% endblock %}
