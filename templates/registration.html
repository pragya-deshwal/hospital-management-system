{% extends "layout.html" %}
{% block content %}

<h2 class="mb-4 text-center">Patient Registration</h2>

<form method="POST" class="mx-auto" style="max-width: 450px;">

    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input 
            type="text" 
            name="name" 
            class="form-control" 
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Age</label>
        <input 
            type="number" 
            name="age" 
            class="form-control" 
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Gender</label>
        <select 
            name="gender" 
            class="form-control" 
            required
        >
            <option value="" disabled selected>Select gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Contact</label>
        <input 
            type="text" 
            name="contact" 
            class="form-control"
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Username</label>
        <input 
            type="text" 
            name="username" 
            class="form-control" 
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <input 
            type="password" 
            name="password" 
            class="form-control" 
            required
        >
    </div>

    <button class="btn btn-success w-100 mt-2">Register</button>
</form>

{% endblock %}
