{% extends "layout.html" %}
{% block content %}

<h2 class="mb-4 text-center">Book Appointment with {{ doctor.name }}</h2>

<form method="POST" class="mx-auto" style="max-width: 400px;">
    <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Time</label>
        <input type="time" name="time" class="form-control" required>
    </div>
    <button class="btn btn-success w-100 mt-2">Confirm Booking</button>
</form>

<a href="{{ url_for('patient.search') }}" class="btn btn-secondary mt-3">Back to Search</a>

{% endblock %}
