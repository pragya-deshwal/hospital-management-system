{% extends "layout.html" %}
{% block content %}

<h2>Edit Doctor</h2>
<hr>

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, msg in messages %}
      <div class="alert alert-{{ category }}">{{ msg }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST" class="w-50">

    <label>Name</label>
    <input 
        type="text" 
        class="form-control" 
        name="name" 
        value="{{ doctor.name }}" 
        required
    >

    <label class="mt-3">Specialization</label>
    <input 
        type="text" 
        class="form-control" 
        name="specialization" 
        value="{{ doctor.specialization }}" 
        required
    >

    <label class="mt-3">Availability</label>
    <input 
        type="text" 
        class="form-control" 
        name="availability" 
        value="{{ doctor.availability }}"
    >

    <button class="btn btn-success mt-4">Update Doctor</button>

</form>

{% endblock %}
